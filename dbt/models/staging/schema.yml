version: 2

models:
  - name: stg_steam__owned_games
    columns:
      - name: appid
        tests:
          - not_null
          - unique
      - name: game_name
        tests:
          - not_null
      - name: playtime_minutes
        tests:
          - not_null

  - name: stg_steam__profile
    columns:
      - name: steamid
        tests:
          - not_null
          - unique
      - name: display_name
        tests:
          - not_null

  - name: stg_steam__achievements
    columns:
      - name: appid
        tests:
          - not_null
      - name: achievement_key
        tests:
          - not_null

  - name: stg_mal__anime_list
    columns:
      - name: mal_id
        tests:
          - not_null
          - unique
      - name: title
        tests:
          - not_null
      - name: list_status
        tests:
          - not_null

  - name: stg_goodreads__books
    columns:
      - name: book_id
        tests:
          - not_null
          - unique
      - name: title
        tests:
          - not_null
      - name: shelf
        tests:
          - not_null

  - name: stg_spotify__top_tracks
    columns:
      - name: track_id
        tests:
          - not_null
      - name: time_range
        tests:
          - not_null
      - name: rank
        tests:
          - not_null

  - name: stg_spotify__top_artists
    columns:
      - name: artist_id
        tests:
          - not_null
      - name: time_range
        tests:
          - not_null

  - name: stg_spotify__recently_played
    columns:
      - name: played_at
        tests:
          - not_null
      - name: track_name
        tests:
          - not_null

  - name: stg_mal__manga_list
    columns:
      - name: mal_id
        tests:
          - not_null
          - unique
      - name: title
        tests:
          - not_null
      - name: list_status
        tests:
          - not_null

  - name: stg_github__profile
    columns:
      - name: login
        tests:
          - not_null
          - unique

  - name: stg_github__repos
    columns:
      - name: repo_id
        tests:
          - not_null
          - unique
      - name: repo_name
        tests:
          - not_null

  - name: stg_x__profile
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

  - name: stg_x__tweets
    columns:
      - name: tweet_id
        tests:
          - not_null
          - unique
      - name: created_at
        tests:
          - not_null
