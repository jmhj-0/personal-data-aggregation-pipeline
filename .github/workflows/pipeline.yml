name: Daily Data Pipeline

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Steam extractor
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: python src/extractors/steam.py

      - name: Run MAL extractor
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_USERNAME: ${{ secrets.MAL_USERNAME }}
        run: python src/extractors/mal.py

      - name: Run Spotify extractor
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python src/extractors/spotify.py

      - name: Run Goodreads extractor
        env:
          GOODREADS_USER_ID: ${{ secrets.GOODREADS_USER_ID }}
        run: python src/extractors/goodreads.py

      - name: Run GitHub extractor
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: python src/extractors/github.py

      - name: Run X extractor
        continue-on-error: true
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
        run: python src/extractors/x.py

      - name: Run dbt
        run: |
          cd dbt
          dbt run --profiles-dir .
          dbt test --profiles-dir .

      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: personal-data-${{ github.run_id }}
          path: data/personal_data.duckdb
          retention-days: 7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build and deploy dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd dashboard
          npm run sources
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
